{{- if .Values.rbac.create }}
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "dra-driver-cpu.fullname" . }}
  labels:
    {{- include "dra-driver-cpu.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
  - apiGroups:
      - resource.k8s.io
    resources:
      - resourceslices
    verbs:
      - list
      - watch
      - create
      - update
      - delete
  - apiGroups:
      - resource.k8s.io
    resources:
      - resourceclaims
      - deviceclasses
    verbs:
      - get
      - list
  - apiGroups:
      - resource.k8s.io
    resources:
      - resourceclaims/status
    verbs:
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  # resourceclaims/driver is a synthetic subresource used to write per-driver
  # device status into ResourceClaim.status.devices (AllocatedDeviceStatus).
  # This enables durable, queryable observability of which CPUs are pinned to
  # each container. Requires feature gate DRAResourceClaimDeviceStatus (beta, k8s v1.36+).
  # The associated-node:update verb restricts writes to claims allocated on this node.
  - apiGroups:
      - "resource.k8s.io"
    resources:
      - resourceclaims/driver
    resourceNames:
      - dra.cpu
    verbs:
      - associated-node:patch
      - associated-node:update
{{- end }}
